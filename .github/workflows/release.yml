name: Release

# 推送 v 开头的 tag（如 v1.0.0）即自动构建并发布。
# 版本号以 pubspec.yaml 的 `version: x.y.z+code` 为准，tag 仅用于触发。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Generate version.json
        id: meta
        run: |
          set -e
          VERSION_LINE=$(grep -E '^version:' pubspec.yaml | head -n1 | sed 's/version:[[:space:]]*//')
          VERSION_NAME=${VERSION_LINE%%+*}
          VERSION_CODE=${VERSION_LINE##*+}
          APK_NAME="cooklog-${VERSION_NAME}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "release/${APK_NAME}"
          SHA256=$(sha256sum "release/${APK_NAME}" | cut -d' ' -f1)
          SIZE=$(stat -c%s "release/${APK_NAME}")
          OWNER_REPO="${GITHUB_REPOSITORY}"
          cat > release/version.json <<EOF
          {
            "versionName": "${VERSION_NAME}",
            "versionCode": ${VERSION_CODE},
            "minSupportedVersionCode": 1,
            "apkUrl": "https://github.com/${OWNER_REPO}/releases/latest/download/${APK_NAME}",
            "fileSize": ${SIZE},
            "sha256": "${SHA256}",
            "forceUpdate": false,
            "changelog": "${GITHUB_REF_NAME} 自动发布",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          cat release/version.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/${{ steps.meta.outputs.apk_name }}
            release/version.json
