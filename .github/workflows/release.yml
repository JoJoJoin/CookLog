name: Release

# 推送 v 开头的 tag（如 v1.0.0）即自动构建并发布。
# 版本号以 pubspec.yaml 的 `version: x.y.z+code` 为准，tag 仅用于触发。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Compute version
        id: ver
        run: |
          # versionName 取 tag（去掉前缀 v）。
          # versionCode 由版本号推导：major*10000 + minor*100 + patch，
          # 与本地构建（pubspec 的 +code）保持一致、随 semver 单调递增，
          # 避免「CI 用提交数 / 本地用 pubspec」两套来源导致的降级安装失败。
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MA MI PA <<< "${VERSION_NAME}"
          VERSION_CODE=$((10#${MA} * 10000 + 10#${MI} * 100 + 10#${PA}))
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "版本：${VERSION_NAME} (${VERSION_CODE})"

      - name: Build release APK
        run: flutter build apk --release --build-name=${{ steps.ver.outputs.name }} --build-number=${{ steps.ver.outputs.code }}

      - name: Generate version.json
        id: meta
        run: |
          set -e
          VERSION_NAME="${{ steps.ver.outputs.name }}"
          VERSION_CODE="${{ steps.ver.outputs.code }}"
          APK_NAME="cooklog-${VERSION_NAME}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "release/${APK_NAME}"
          SHA256=$(sha256sum "release/${APK_NAME}" | cut -d' ' -f1)
          SIZE=$(stat -c%s "release/${APK_NAME}")
          OWNER_REPO="${GITHUB_REPOSITORY}"
          cat > release/version.json <<EOF
          {
            "versionName": "${VERSION_NAME}",
            "versionCode": ${VERSION_CODE},
            "minSupportedVersionCode": 1,
            "apkUrl": "https://github.com/${OWNER_REPO}/releases/latest/download/${APK_NAME}",
            "fileSize": ${SIZE},
            "sha256": "${SHA256}",
            "forceUpdate": false,
            "changelog": "${GITHUB_REF_NAME} 自动发布",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"
          cat release/version.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/${{ steps.meta.outputs.apk_name }}
            release/version.json
